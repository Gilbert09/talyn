name: Publish

# Two ways to cut a stable release:
#   1. Actions → Publish → "Run workflow" — version optional (empty = next
#      patch above the highest existing release). Fully CI, no local git.
#   2. Push a vX.Y.Z tag (the original path) — still works identically.
# Either way electron-builder creates the GitHub Release (tag included, for
# the dispatch path) as a FULL release, which is what the stable update
# channel and the website's download button follow.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z). Leave empty for the next patch above the latest release.'
        required: false
        type: string

jobs:
  publish:
    # macOS is the only supported auto-update target for now.
    runs-on: macos-latest
    # Needed for GITHUB_TOKEN to create the GitHub Release + upload assets.
    permissions:
      contents: write

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Install Node and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm install

      - name: Resolve release version
        # Build-time only — not committed. electron-builder packages from
        # directories.app (release/app), so the version it bakes in (and what
        # app.getVersion() / the update feed report) comes from
        # release/app/package.json. Without this, every build would ship as
        # the stale static version (0.1.0) and updaters would never take it.
        # Source of truth: the pushed tag, or the dispatch input, or (empty
        # input) the next patch above the highest version ever released —
        # nightlies included, so stable always supersedes last night's build.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq '.[].tag_name' > /tmp/release-tags.txt || true
            VERSION=$(node -e "
              const fs = require('fs');
              const parse = (s) => {
                const m = /^v?(\d+)\.(\d+)\.(\d+)$/.exec(s.trim());
                return m && [Number(m[1]), Number(m[2]), Number(m[3])];
              };
              const tags = fs.existsSync('/tmp/release-tags.txt')
                ? fs.readFileSync('/tmp/release-tags.txt', 'utf8').split('\n')
                : [];
              const cmp = (a, b) => a[0] - b[0] || a[1] - b[1] || a[2] - b[2];
              const max = tags.map(parse).filter(Boolean).sort(cmp).pop() ?? [0, 1, 0];
              console.log([max[0], max[1], max[2] + 1].join('.'));
            ")
          fi
          cd apps/desktop/release/app
          node -e "
            const fs = require('fs');
            const p = require('./package.json');
            if (!/^\d+\.\d+\.\d+$/.test('$VERSION')) {
              throw new Error('Version must be X.Y.Z, got: $VERSION');
            }
            p.version = '$VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
            console.log('Building release', p.version);
          "

      - name: Build shared package
        run: |
          npm run build -w @talyn/shared

      - name: Build desktop app
        # Baked into the renderer bundle by webpack at build time — must be on
        # this step. Without them the app defaults to http://localhost:4747
        # with no auth. Supabase anon key is publishable, hence repo variables.
        env:
          TALYN_API_URL: https://prod.talyn.dev
          TALYN_SUPABASE_URL: ${{ vars.TALYN_SUPABASE_URL }}
          TALYN_SUPABASE_ANON_KEY: ${{ vars.TALYN_SUPABASE_ANON_KEY }}
          TALYN_POSTHOG_KEY: ${{ vars.TALYN_POSTHOG_KEY }}
          TALYN_POSTHOG_HOST: https://us.i.posthog.com
        run: |
          npm run build -w @talyn/desktop

      - name: Upload renderer source maps to PostHog
        # Symbolicates renderer exceptions in PostHog. `inject` stamps chunk IDs
        # into the built JS + maps so PostHog can match a minified frame back to
        # its source; `upload --delete-after` ships the maps to PostHog then
        # deletes them from disk so they aren't packed into the shipped app.
        # Runs after the build and before packaging so electron-builder bundles
        # the injected JS. No-op until POSTHOG_CLI_API_KEY is configured, and
        # never blocks a release — symbolication is auxiliary. (The skip is
        # guarded inside the script, not via `if:` — the `secrets` context is
        # not allowed in `if` conditions.)
        continue-on-error: true
        env:
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_PROJECT_ID: ${{ vars.POSTHOG_CLI_PROJECT_ID }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
        run: |
          if [ -z "$POSTHOG_CLI_API_KEY" ]; then
            echo "POSTHOG_CLI_API_KEY not set — skipping source map upload."
            exit 0
          fi
          npx --yes @posthog/cli@latest sourcemap inject \
            --directory apps/desktop/release/app/dist/renderer
          npx --yes @posthog/cli@latest sourcemap upload \
            --directory apps/desktop/release/app/dist/renderer --delete-after

      - name: Publish releases
        env:
          # Code-signing + notarization. The app must be signed with a
          # Developer ID Application cert and notarized or Squirrel.Mac
          # refuses to apply the update on the client.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Releases publish to this (public) repo, so the workflow's own
          # GITHUB_TOKEN can upload the assets — no PAT needed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/desktop
          # electron is hoisted to the monorepo root node_modules, so
          # electron-builder can't infer the version from this workspace —
          # resolve it explicitly and pass it in.
          ELECTRON_VERSION=$(node -p "require('electron/package.json').version")
          npm exec electron-builder -- --publish always \
            -c.electronVersion="$ELECTRON_VERSION"
